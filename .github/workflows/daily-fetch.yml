name: daily-fetch

on:
  # 全年覆蓋盤後 17:30 ET。兩個 cron 都會跑,第二次的結果會覆蓋第一次:
  #   21:30 UTC = 17:30 ET 夏令(DST,~3 月中~11 月初)/ 16:30 ET 冬令
  #   22:30 UTC = 18:30 ET 夏令              / 17:30 ET 冬令(EST)
  # 結果:DST 期間最終 latest.json 反映 22:30 那次(更晚、數據更穩);EST 期間 21:30 那次是剛收盤,
  # 22:30 那次才是真正盤後 30 分,也會覆蓋掉前一次。
  schedule:
    - cron: "30 21 * * 1-5"
    - cron: "30 22 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Fetch watchlist data
        run: python scripts/fetch_data.py

      - name: Commit & push docs/
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "data: $(date -u +%Y-%m-%d)"
            git push
          fi
